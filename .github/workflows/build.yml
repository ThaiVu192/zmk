name: Build Firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: docker.io/zmkfirmware/zmk-build-arm:4.1
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache west modules
        uses: actions/cache@v5
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
          key: ${{ runner.os }}-zmk-cache-${{ hashFiles('app/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-zmk-cache-

      - name: West init
        run: west init -l app

      - name: West update
        run: west update --fetch-opt=--filter=tree:0

      - name: West zephyr-export
        run: west zephyr-export

      - name: List available boards (debug)
        run: |
          echo "=== Available boards containing 'nice' ==="
          west boards | grep -i nice || echo "No 'nice' board found"
          echo "=== First 20 boards ==="
          west boards | head -20

      - name: Build with nice_nano (v1 compatible)
        run: |
          west build -s app -p -b nice_nano -- -DSHIELD="filco_tkl_wireless"

      - name: Upload UF2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: nice_nano-filco_tkl_wireless
          path: build/zephyr/zmk.uf2